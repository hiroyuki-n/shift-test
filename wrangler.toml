name = "shift-test"
main = "./.output/server/index.mjs"
compatibility_date = "2024-09-19"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

# Nuxt(Nitro) がビルドした静的アセット
assets = { directory = "./.output/public/", binding = "ASSETS" }

# 環境変数（SUPABASE_URL / SUPABASE_KEY）は Cloudflare ダッシュボードの
# 「Variables and Secrets」で管理する。
# ※ ここ([vars])に書くと wrangler deploy 時にダッシュボードの値を上書きするため、
#    ダッシュボード管理にする場合は定義しないこと。
# DBパスワードなどの機密値は `wrangler secret put` で登録すること。
# 例) npx wrangler secret put SUPABASE_SERVICE_ROLE_KEY
